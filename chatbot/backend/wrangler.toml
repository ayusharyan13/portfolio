name = "portfolio-chatbot"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# AI binding — used for embeddings (free tier: 10k Neurons/day)
[ai]
binding = "AI"

# Environment variables (non-secret config)
[vars]
LLM_PROVIDER = "groq"
GROQ_MODEL = "llama-3.1-8b-instant"
MAX_TOKENS = "512"
TEMPERATURE = "0.7"

# API keys — set these via `npx wrangler secret put`
# npx wrangler secret put GROQ_API_KEY  ← the only key you need!
